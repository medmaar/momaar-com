<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Momaar — IPTV Tools</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#0d1117;color:#e6edf3;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px}
.logo{font-size:28px;font-weight:800;letter-spacing:-0.5px;margin-bottom:6px}
.logo span{color:#25D366}
.sub{font-size:14px;color:#6e7681;margin-bottom:48px}
.cards{display:flex;flex-direction:column;gap:14px;width:100%;max-width:400px}
.card{background:#161b22;border:1px solid #30363d;border-radius:14px;padding:22px 22px 20px;text-decoration:none;color:inherit;transition:border-color .15s,transform .1s;display:block}
.card:hover{border-color:#25D366;transform:translateY(-1px)}
.card:active{transform:scale(0.99)}
.card-icon{font-size:28px;margin-bottom:10px}
.card-title{font-size:16px;font-weight:700;margin-bottom:4px}
.card-desc{font-size:13px;color:#8b949e;line-height:1.5}
.card-arrow{float:right;color:#25D366;font-size:18px;margin-top:-2px}
footer{margin-top:48px;font-size:12px;color:#484f58}
</style>
</head>
<body>
<div class="logo">moma<span>ar</span></div>
<div class="sub">Private IPTV Tools</div>
<div class="cards">
  <a class="card" href="/trial">
    <span class="card-arrow">→</span>
    <div class="card-icon">🔑</div>
    <div class="card-title">Credential Generator</div>
    <div class="card-desc">Paste an M3U link and instantly format credentials to send to clients.</div>
  </a>
  <a class="card" href="/followup">
    <span class="card-arrow">→</span>
    <div class="card-icon">💬</div>
    <div class="card-title">Follow-Up Dashboard</div>
    <div class="card-desc">View all free trial users and send one-click WhatsApp follow-ups.</div>
  </a>
</div>
<footer>momaar.com — private use only</footer>
</body>
</html>
