name: Deploy momaar-com to Cloudflare Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Install wrangler
        run: npm install -g wrangler

      - name: Deploy to Cloudflare Pages
        run: wrangler pages deploy . --project-name=momaar-com --branch=main
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.ACCOUNT_ID }}

      - name: Add momaar.com custom domain
        run: |
          curl -s -X POST \
            "https://api.cloudflare.com/client/v4/accounts/${{ secrets.ACCOUNT_ID }}/pages/projects/momaar-com/domains" \
            -H "Authorization: Bearer ${{ secrets.CF_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d '{"name":"momaar.com"}' | python3 -c "
          import sys,json
          d=json.load(sys.stdin)
          print('Custom domain:', 'added ✅' if d.get('success') else d.get('errors','already set'))
          " || true

      - name: Fix momaar.com DNS — find zone and update records
        run: |
          # Get zone ID for momaar.com
          ZONE=$(curl -s "https://api.cloudflare.com/client/v4/zones?name=momaar.com" \
            -H "Authorization: Bearer ${{ secrets.CF_TOKEN }}" \
            | python3 -c "import sys,json; z=json.load(sys.stdin).get('result',[]); print(z[0]['id'] if z else 'NOT_FOUND')")
          echo "Zone ID: $ZONE"

          if [ "$ZONE" = "NOT_FOUND" ]; then
            echo "momaar.com not found in Cloudflare zones"
            exit 0
          fi

          # List existing DNS records
          RECORDS=$(curl -s "https://api.cloudflare.com/client/v4/zones/$ZONE/dns_records" \
            -H "Authorization: Bearer ${{ secrets.CF_TOKEN }}")
          echo "Existing records:"
          echo "$RECORDS" | python3 -c "
          import sys,json
          for r in json.load(sys.stdin).get('result',[]):
              print(f\"  {r['type']} {r['name']} -> {r['content']} (id:{r['id']})\")
          "

          # Delete all A and CNAME records for root and www
          echo "$RECORDS" | python3 -c "
          import sys,json,subprocess
          records=json.load(sys.stdin).get('result',[])
          for r in records:
              if r['type'] in ('A','CNAME') and r['name'] in ('momaar.com','www.momaar.com'):
                  result=subprocess.run(['curl','-s','-X','DELETE',
                      f\"https://api.cloudflare.com/client/v4/zones/$ZONE/dns_records/{r['id']}\",
                      '-H','Authorization: Bearer ${{ secrets.CF_TOKEN }}'],
                      capture_output=True,text=True)
                  print(f\"Deleted {r['type']} {r['name']}: {result.stdout[:80]}\")
          "

          # Add CNAME @ -> momaar-com.pages.dev  
          curl -s -X POST "https://api.cloudflare.com/client/v4/zones/$ZONE/dns_records" \
            -H "Authorization: Bearer ${{ secrets.CF_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d '{"type":"CNAME","name":"@","content":"momaar-com.pages.dev","proxied":true}' \
            | python3 -c "import sys,json; d=json.load(sys.stdin); print('Root CNAME:', '✅' if d.get('success') else d.get('errors'))"

          # Add CNAME www -> momaar-com.pages.dev
          curl -s -X POST "https://api.cloudflare.com/client/v4/zones/$ZONE/dns_records" \
            -H "Authorization: Bearer ${{ secrets.CF_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d '{"type":"CNAME","name":"www","content":"momaar-com.pages.dev","proxied":true}' \
            | python3 -c "import sys,json; d=json.load(sys.stdin); print('WWW CNAME:', '✅' if d.get('success') else d.get('errors'))"
