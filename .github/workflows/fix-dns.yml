name: Fix momaar.com DNS

on:
  workflow_dispatch:

jobs:
  fix-dns:
    runs-on: ubuntu-latest
    env:
      CF_TOKEN: ${{ secrets.CF_TOKEN }}
      ACCOUNT_ID: ${{ secrets.ACCOUNT_ID }}
    steps:
      - name: Get momaar.com zone ID
        id: zone
        run: |
          ZONE=$(curl -s "https://api.cloudflare.com/client/v4/zones?name=momaar.com" \
            -H "Authorization: Bearer $CF_TOKEN" \
            | python3 -c "import sys,json; z=json.load(sys.stdin).get('result',[]); print(z[0]['id'] if z else 'NOT_FOUND')")
          echo "zone=$ZONE" >> $GITHUB_OUTPUT
          echo "Zone: $ZONE"

      - name: List current DNS records
        run: |
          curl -s "https://api.cloudflare.com/client/v4/zones/${{ steps.zone.outputs.zone }}/dns_records" \
            -H "Authorization: Bearer $CF_TOKEN" \
            | python3 -c "
          import sys,json
          for r in json.load(sys.stdin).get('result',[]):
              print(r['type'], r['name'], '->', r['content'], '|', r['id'])
          "

      - name: Delete old A and CNAME records for momaar.com
        run: |
          RECORDS=$(curl -s "https://api.cloudflare.com/client/v4/zones/${{ steps.zone.outputs.zone }}/dns_records" \
            -H "Authorization: Bearer $CF_TOKEN")
          
          echo "$RECORDS" | python3 << 'PYEOF'
          import sys, json, subprocess, os
          zone = "${{ steps.zone.outputs.zone }}"
          token = os.environ["CF_TOKEN"]
          data = json.load(sys.stdin)
          for r in data.get("result", []):
              if r["type"] in ("A", "CNAME") and r["name"] in ("momaar.com", "www.momaar.com"):
                  out = subprocess.run([
                      "curl", "-s", "-X", "DELETE",
                      f"https://api.cloudflare.com/client/v4/zones/{zone}/dns_records/{r['id']}",
                      "-H", f"Authorization: Bearer {token}"
                  ], capture_output=True, text=True).stdout
                  print(f"Deleted {r['type']} {r['name']}: {json.loads(out).get('success','?')}")
          PYEOF

      - name: Add CNAME root -> momaar-com.pages.dev
        run: |
          curl -s -X POST \
            "https://api.cloudflare.com/client/v4/zones/${{ steps.zone.outputs.zone }}/dns_records" \
            -H "Authorization: Bearer $CF_TOKEN" \
            -H "Content-Type: application/json" \
            -d '{"type":"CNAME","name":"@","content":"momaar-com.pages.dev","proxied":true}' \
            | python3 -c "import sys,json; d=json.load(sys.stdin); print('Root CNAME:', 'added' if d.get('success') else d.get('errors'))"

      - name: Add CNAME www -> momaar-com.pages.dev
        run: |
          curl -s -X POST \
            "https://api.cloudflare.com/client/v4/zones/${{ steps.zone.outputs.zone }}/dns_records" \
            -H "Authorization: Bearer $CF_TOKEN" \
            -H "Content-Type: application/json" \
            -d '{"type":"CNAME","name":"www","content":"momaar-com.pages.dev","proxied":true}' \
            | python3 -c "import sys,json; d=json.load(sys.stdin); print('WWW CNAME:', 'added' if d.get('success') else d.get('errors'))"
